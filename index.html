<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Thainá Beauty | Gestão Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:wght@100;300;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root {
            --burgundy: #120303;
            --deep-rose: #2a0505;
            --gold: #d4af37;
            --gold-light: #f9f1b0;
            --gold-shimmer: linear-gradient(90deg, #a67c00, #f9f1b0, #d4af37, #a67c00);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--burgundy); font-family: 'Montserrat', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--deep-rose) 0%, var(--burgundy) 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: 1.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .logo-txt { font-family: 'Cinzel Decorative', cursive; font-size: 3.5rem; background: var(--gold-shimmer); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; letter-spacing: 10px; }

        /* --- DASHBOARD --- */
        #app { display: none; padding: 80px 20px; max-width: 1300px; margin: 0 auto; animation: reveal 2s ease forwards; }
        header { text-align: center; margin-bottom: 80px; }
        header h1 { font-family: 'Cinzel Decorative', cursive; font-size: 2.8rem; color: var(--gold); letter-spacing: 12px; }
        .luxury-line { width: 150px; height: 1px; background: var(--gold-shimmer); margin: 20px auto; box-shadow: 0 0 10px var(--gold); }

        .glass-panel { background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(212, 175, 55, 0.15); padding: 40px; backdrop-filter: blur(30px); }
        table { width: 100%; border-collapse: collapse; }
        th { font-family: 'Cinzel Decorative', cursive; color: var(--gold); font-size: 0.8rem; letter-spacing: 4px; padding: 25px; text-align: left; border-bottom: 1px solid rgba(212, 175, 55, 0.4); }
        td { padding: 30px 25px; border-bottom: 1px solid rgba(255,255,255,0.02); font-weight: 200; }
        .gold-txt { color: var(--gold); font-weight: 600; letter-spacing: 1.5px; }

        .btn-action { background: none; border: 1px solid rgba(212, 175, 55, 0.3); color: #ff4d4d; padding: 10px 20px; cursor: pointer; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; }
        .btn-action:hover { background: #ff4d4d; color: white; border-color: #ff4d4d; }

        .fab-elite { position: fixed; bottom: 60px; right: 60px; width: 80px; height: 80px; background: var(--gold-shimmer); background-size: 200% auto; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        /* --- MODAL --- */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; justify-content: center; align-items: center; z-index: 20000; }
        .modal-box { background: var(--burgundy); border: 1px solid var(--gold); padding: 60px; width: 95%; max-width: 550px; }
        .input-wrap { margin-bottom: 35px; }
        .input-wrap label { display: block; font-size: 0.6rem; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 3px; }
        input { width: 100%; background: none; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3); color: white; padding: 12px 0; font-size: 1.1rem; }
        .btn-save { width: 100%; padding: 22px; background: var(--gold-shimmer); border: none; color: black; font-weight: 700; text-transform: uppercase; letter-spacing: 5px; cursor: pointer; }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes reveal { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box">
            <h1 class="logo-txt">Studio Thainá</h1>
        </div>
    </div>

    <div id="app">
        <header>
            <h1>Studio Thainá Beauty</h1>
            <div class="luxury-line"></div>
        </header>

        <div class="glass-panel">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Horário</th>
                        <th>Procedimento</th>
                        <th style="text-align: right;">Gestão</th>
                    </tr>
                </thead>
                <tbody id="agenda-list"></tbody>
            </table>
            <div id="empty" style="text-align: center; padding: 60px; opacity: 0.2; letter-spacing: 2px;">Carregando Livro de Ouro...</div>
        </div>

        <button class="fab-elite" onclick="openM()">
            <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <div id="modal">
        <div class="modal-box">
            <h2 style="font-family: 'Cinzel Decorative'; color: var(--gold); text-align: center; margin-bottom: 40px;">Réserver</h2>
            <div class="input-wrap"><label>Nome</label><input type="text" id="in-nome"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div class="input-wrap"><label>Data</label><input type="text" id="in-data" placeholder="00/00/0000" maxlength="10"></div>
                <div class="input-wrap"><label>Horário</label><input type="text" id="in-hora" placeholder="00:00" maxlength="5"></div>
            </div>
            <div class="input-wrap"><label>Procedimento</label><input type="text" id="in-proc"></div>
            <button class="btn-save" onclick="add()">Confirmar</button>
            <button onclick="closeM()" style="background:none; border:none; color:white; width:100%; margin-top:30px; cursor:pointer; opacity: 0.3; font-size: 0.6rem;">VOLTAR</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyB5WTIfRlINDEt_f2cuIFvmRpAf9vDErP4", 
            authDomain: "studio-thaina.firebaseapp.com", 
            projectId: "studio-thaina", 
            storageBucket: "studio-thaina.firebasestorage.app", 
            messagingSenderId: "243259332862", 
            appId: "1:243259332862:web:e582b929fca128e9e5edaf", 
            measurementId: "G-W8RB689VZ3" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // MÁSCARAS
        document.getElementById('in-data').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
            if (v.length > 5) v = v.substring(0, 5) + '/' + v.substring(5, 9);
            e.target.value = v;
        });
        document.getElementById('in-hora').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0, 2) + ':' + v.substring(2, 4);
            e.target.value = v;
        });

        // NAVEGAÇÃO
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').style.transform = 'translateY(-100%)';
                setTimeout(() => { document.getElementById('app').style.display = 'block'; }, 1000);
            }, 2500);
        };

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        // LÓGICA DO BANCO DE DADOS (Ouvindo em tempo real)
        function add() {
            const n = document.getElementById('in-nome').value;
            const d = document.getElementById('in-data').value;
            const h = document.getElementById('in-hora').value;
            const p = document.getElementById('in-proc').value;

            if(!n || !d || !h || !p) { alert("Preencha todos os campos!"); return; }

            db.ref('agendamentos').push({ n, d, h, p })
                .then(() => {
                    closeM();
                    ['in-nome','in-data','in-hora','in-proc'].forEach(id => document.getElementById(id).value = "");
                });
        }

        // Esta função roda sozinha toda vez que algo muda no Firebase
        db.ref('agendamentos').on('value', (snapshot) => {
            const tbody = document.getElementById('agenda-list');
            const emptyMsg = document.getElementById('empty');
            tbody.innerHTML = "";
            
            if (snapshot.exists()) {
                emptyMsg.style.display = 'none';
                snapshot.forEach((child) => {
                    const val = child.val();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-weight:600;">${val.n}</td>
                        <td>${val.d}</td>
                        <td class="gold-txt">${val.h}</td>
                        <td style="font-style:italic; opacity: 0.7;">${val.p}</td>
                        <td style="text-align: right;">
                            <button class="btn-action" onclick="removeData('${child.key}')">Remover</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } else {
                emptyMsg.style.display = 'block';
                emptyMsg.innerText = "Nenhum agendamento encontrado.";
            }
        });

        function removeData(key) {
            if(confirm("Deseja apagar este registro?")) {
                db.ref('agendamentos/' + key).remove();
            }
        }
    </script>
</body>
</html>
